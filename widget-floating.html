<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spurl Floating Widget</title>
  <style>
    :root {
      color-scheme: dark;
      --deep-green: #07130f;
      --green: #173629;
      --cream: #fff8ed;
      --gold: #c2a05a;
      --gold-soft: #ffe9bf;
      --line: rgba(194, 160, 90, 0.18);
      --panel: rgba(7, 19, 15, 0.97);
      --muted: #dbe6de;
      --shadow: 0 18px 42px rgba(0, 0, 0, 0.35);
    }

    * { box-sizing: border-box; }

    html, body { width: 100%; min-height: 100%; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      color: var(--cream);
      background:
        radial-gradient(circle at top, rgba(194, 160, 90, 0.08), transparent 18%),
        linear-gradient(135deg, var(--deep-green), var(--green) 45%, #0d231b);
      overflow: hidden;
    }

    .floating-widget {
      position: fixed;
      right: 16px;
      bottom: 16px;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 12px;
      pointer-events: none;
    }

    .floating-widget > * { pointer-events: auto; }

    .widget-launcher {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 64px;
      height: 64px;
      border: 1px solid rgba(194, 160, 90, 0.35);
      border-radius: 999px;
      background: linear-gradient(145deg, var(--gold-soft), var(--gold));
      color: #102218;
      box-shadow: var(--shadow);
      cursor: pointer;
      font-weight: 800;
      font-size: 1rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      transition: transform 160ms ease, box-shadow 160ms ease;
      user-select: none;
    }

    .widget-launcher:hover,
    .widget-launcher:focus-visible {
      transform: translateY(-1px) scale(1.02);
      box-shadow: 0 22px 48px rgba(0, 0, 0, 0.38);
      outline: none;
    }

    .widget-panel {
      width: min(360px, calc(100vw - 18px));
      max-height: min(72vh, 680px);
      border: 1px solid var(--line);
      border-radius: 18px;
      background: var(--panel);
      box-shadow: var(--shadow);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transform: translateY(10px) scale(0.98);
      opacity: 0;
      pointer-events: none;
      transition: opacity 160ms ease, transform 160ms ease;
    }

    .floating-widget.is-open .widget-panel {
      opacity: 1;
      transform: translateY(0) scale(1);
      pointer-events: auto;
    }

    .floating-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.75rem;
      padding: 0.75rem 0.8rem;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.03), rgba(255, 255, 255, 0.01));
    }

    .floating-title {
      font-size: 0.98rem;
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    .floating-subtitle {
      color: var(--muted);
      font-size: 0.78rem;
    }

    .icon-button {
      border: 1px solid rgba(194, 160, 90, 0.28);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.04);
      color: var(--cream);
      width: 2rem;
      height: 2rem;
      display: grid;
      place-items: center;
      cursor: pointer;
      font-size: 1rem;
      line-height: 1;
    }

    .floating-body {
      display: flex;
      flex-direction: column;
      min-height: 0;
      padding: 0.65rem 0.75rem 0.75rem;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.02), rgba(255, 255, 255, 0));
    }

    .chip-row {
      display: flex;
      flex-wrap: wrap;
      gap: 0.35rem;
      margin-bottom: 0.45rem;
    }

    .topic-button {
      padding: 0.35rem 0.45rem;
      border: 1px solid rgba(194, 160, 90, 0.24);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.04);
      color: var(--cream);
      font-size: 0.78rem;
      cursor: pointer;
      text-align: left;
    }

    .chat-log {
      display: flex;
      flex-direction: column;
      gap: 0.45rem;
      max-height: 260px;
      overflow: auto;
      padding-right: 0.15rem;
    }

    .message {
      display: flex;
      align-items: flex-end;
      gap: 0.45rem;
    }

    .message__avatar {
      width: 1.8rem;
      height: 1.8rem;
      display: grid;
      place-items: center;
      border-radius: 999px;
      background: linear-gradient(135deg, var(--gold-soft), var(--gold));
      color: #102218;
      font-size: 0.75rem;
      font-weight: 700;
      flex: 0 0 1.8rem;
    }

    .message--bot .message__bubble {
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .message--user { justify-content: flex-end; }

    .message--user .message__avatar {
      order: 2;
      background: linear-gradient(135deg, #d9f7e5, var(--gold));
    }

    .message--user .message__bubble {
      background: linear-gradient(135deg, rgba(194, 160, 90, 0.22), rgba(255, 255, 255, 0.08));
      border: 1px solid rgba(194, 160, 90, 0.24);
    }

    .message__bubble {
      max-width: 92%;
      padding: 0.45rem 0.55rem;
      border-radius: 12px 12px 12px 4px;
      color: var(--cream);
      font-size: 0.86rem;
      line-height: 1.35;
    }

    .message--user .message__bubble { border-radius: 12px 12px 4px 12px; }

    .chat-form {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 0.35rem;
      margin-top: 0.45rem;
    }

    .chat-input {
      width: 100%;
      min-height: 40px;
      padding: 0.52rem 0.55rem;
      border: 1px solid rgba(194, 160, 90, 0.25);
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.04);
      color: var(--cream);
      font: inherit;
    }

    .chat-input:focus-visible {
      outline: 2px solid rgba(194, 160, 90, 0.8);
      outline-offset: 2px;
    }

    .send-button {
      border: 0;
      border-radius: 10px;
      padding: 0 0.65rem;
      background: linear-gradient(135deg, var(--gold-soft), var(--gold));
      color: #102218;
      font-weight: 700;
      cursor: pointer;
      min-height: 40px;
    }

    @media (max-width: 640px) {
      .floating-widget {
        right: 10px;
        bottom: 10px;
        left: 10px;
        align-items: stretch;
      }

      .widget-panel {
        width: 100%;
        max-width: none;
      }

      .widget-launcher {
        width: 58px;
        height: 58px;
        align-self: flex-end;
      }
    }
  </style>
</head>
<body>
  <aside class="floating-widget" aria-label="Ask Spurl floating widget" aria-live="polite">
    <button class="widget-launcher" type="button" data-launcher aria-expanded="false" aria-controls="spurl-chat-panel" aria-label="Open Ask Spurl chatbot">Ask Spurl</button>

    <section class="widget-panel" id="spurl-chat-panel" aria-label="Spurl chatbot panel">
      <header class="floating-header">
        <div>
          <div class="floating-title">Ask Spurl</div>
          <div class="floating-subtitle">Spurl assistant</div>
        </div>
        <button class="icon-button" type="button" data-close-widget aria-label="Close chatbot panel">×</button>
      </header>
      <div class="floating-body">
        <div class="chip-row" data-suggestions></div>
        <div class="chat-log" data-chat-log aria-live="polite"></div>
        <form class="chat-form" data-chat-form>
          <input class="chat-input" type="text" data-chat-input placeholder="Ask about the site…" autocomplete="off" />
          <button class="send-button" type="submit">Go</button>
        </form>
      </div>
    </section>
  </aside>

  <script src="js/knowledge-bot.js"></script>
  <script src="js/chatbot.js"></script>
  <script>
    const widget = document.querySelector('.floating-widget');
    const launcher = document.querySelector('[data-launcher]');
    const closeButton = document.querySelector('[data-close-widget]');

    function openWidget() {
      widget.classList.add('is-open');
      launcher.setAttribute('aria-expanded', 'true');
    }

    function closeWidget() {
      widget.classList.remove('is-open');
      launcher.setAttribute('aria-expanded', 'false');
      launcher.focus();
    }

    launcher.addEventListener('click', () => {
      if (widget.classList.contains('is-open')) {
        closeWidget();
      } else {
        openWidget();
      }
    });

    closeButton.addEventListener('click', closeWidget);

    document.addEventListener('click', (event) => {
      if (!widget.contains(event.target) && widget.classList.contains('is-open')) {
        closeWidget();
      }
    });

    document.addEventListener('keydown', (event) => {
      if (event.key === 'Escape' && widget.classList.contains('is-open')) {
        closeWidget();
      }
    });
  </script>
</body>
</html>
