<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CAINT | The Spurl Guide</title>
  <style>
    :root {
      color-scheme: dark;
      --deep-green: #07130f;
      --green: #173629;
      --cream: #fff8ed;
      --gold: #c2a05a;
      --gold-soft: #ffe9bf;
      --line: rgba(194, 160, 90, 0.18);
      --panel: rgba(7, 19, 15, 0.97);
      --muted: #dbe6de;
      --shadow: 0 18px 42px rgba(0, 0, 0, 0.35);
    }

    * { box-sizing: border-box; }

    html, body {
      width: 100%;
      min-height: 100%;
      margin: 0;
      padding: 0;
      background: transparent;
      overflow: hidden;
    }

    body {
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      color: var(--cream);
      background: transparent;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    .floating-widget {
      position: fixed;
      right: 16px;
      bottom: 16px;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 12px;
      pointer-events: none;
    }

    .floating-widget > * { pointer-events: auto; }

    .widget-launcher {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 72px;
      height: 72px;
      border: 1px solid rgba(194, 160, 90, 0.35);
      border-radius: 999px;
      background:
        linear-gradient(145deg, rgba(7, 19, 15, 0.22), rgba(7, 19, 15, 0.08)),
        url("assets/sloitar-chatbot.png") center / cover no-repeat,
        linear-gradient(145deg, var(--gold-soft), var(--gold));
      color: var(--cream);
      box-shadow: 0 14px 28px rgba(0, 0, 0, 0.28), 0 0 0 1px rgba(255, 255, 255, 0.02) inset;
      cursor: pointer;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      font-weight: 800;
      font-size: 0.82rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      text-shadow: 0 2px 4px rgba(7, 19, 15, 0.85);
      transition: transform 180ms ease, box-shadow 180ms ease, filter 180ms ease;
      user-select: none;
      overflow: visible;
      animation: launcher-breathe 4.8s ease-in-out infinite;
    }

    .widget-launcher span {
      position: relative;
      z-index: 1;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(180deg, rgba(7, 19, 15, 0.10), rgba(7, 19, 15, 0.38));
      padding: 0.15rem;
      text-align: center;
      line-height: 1.02;
    }

    .widget-launcher:hover,
    .widget-launcher:focus-visible {
      transform: translateY(-2px) scale(1.02);
      box-shadow: 0 18px 34px rgba(0, 0, 0, 0.35), 0 0 0 1px rgba(194, 160, 90, 0.3) inset;
      filter: saturate(1.05);
      outline: none;
    }

    .widget-launcher::after {
      content: "CAINT\AThe Spurl Guide";
      position: absolute;
      right: calc(100% + 10px);
      bottom: 8px;
      white-space: pre-line;
      min-width: 130px;
      padding: 0.45rem 0.55rem;
      border: 1px solid rgba(194, 160, 90, 0.35);
      border-radius: 12px;
      background: rgba(7, 19, 15, 0.96);
      color: var(--cream);
      font-size: 0.72rem;
      line-height: 1.25;
      text-transform: none;
      letter-spacing: 0;
      text-shadow: none;
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.35);
      opacity: 0;
      transform: translateY(4px);
      pointer-events: none;
      transition: opacity 160ms ease, transform 160ms ease;
    }

    @keyframes launcher-breathe {
      0%, 100% { box-shadow: 0 14px 28px rgba(0, 0, 0, 0.28), 0 0 0 1px rgba(255, 255, 255, 0.02) inset; }
      50% { box-shadow: 0 16px 32px rgba(0, 0, 0, 0.32), 0 0 0 1px rgba(194, 160, 90, 0.18) inset; }
    }

    @media (hover: hover) and (pointer: fine) {
      .widget-launcher:hover::after,
      .widget-launcher:focus-visible::after {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .widget-panel {
      width: min(370px, calc(100vw - 18px));
      max-height: min(78vh, 720px);
      border: 1px solid var(--line);
      border-radius: 18px;
      background: linear-gradient(180deg, rgba(7, 19, 15, 0.98), rgba(7, 19, 15, 0.96));
      box-shadow: var(--shadow);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transform: translateY(10px) scale(0.98);
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transition: opacity 160ms ease, transform 160ms ease, visibility 160ms ease;
    }

    .floating-widget.is-open .widget-panel {
      opacity: 1;
      visibility: visible;
      transform: translateY(0) scale(1);
      pointer-events: auto;
    }

    .floating-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.75rem;
      padding: 0.75rem 0.8rem;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(194, 160, 90, 0.10), rgba(7, 19, 15, 0.98));
    }

    .floating-title {
      font-size: 1rem;
      font-weight: 800;
      letter-spacing: 0.03em;
      text-transform: uppercase;
      color: var(--cream);
    }

    .floating-subtitle {
      color: var(--gold-soft);
      font-size: 0.78rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .icon-button {
      border: 1px solid rgba(194, 160, 90, 0.28);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.04);
      color: var(--cream);
      width: 2rem;
      height: 2rem;
      display: grid;
      place-items: center;
      cursor: pointer;
      font-size: 1rem;
      line-height: 1;
    }

    .floating-body {
      display: flex;
      flex-direction: column;
      min-height: 0;
      padding: 0.65rem 0.75rem 0.75rem;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.02), rgba(255, 255, 255, 0));
      min-height: 0;
    }

    .chip-row {
      display: flex;
      flex-wrap: wrap;
      gap: 0.35rem;
      margin-bottom: 0.45rem;
    }

    .topic-button {
      padding: 0.35rem 0.45rem;
      border: 1px solid rgba(194, 160, 90, 0.24);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.04);
      color: var(--cream);
      font-size: 0.78rem;
      cursor: pointer;
      text-align: left;
    }

    .chat-log {
      display: flex;
      flex-direction: column;
      gap: 0.45rem;
      max-height: 260px;
      overflow: auto;
      padding-right: 0.15rem;
      min-height: 0;
    }

    .message {
      display: flex;
      align-items: flex-end;
      gap: 0.45rem;
    }

    .message__avatar {
      width: 1.8rem;
      height: 1.8rem;
      display: grid;
      place-items: center;
      border-radius: 999px;
      background: linear-gradient(135deg, var(--gold-soft), var(--gold));
      color: #102218;
      font-size: 0.75rem;
      font-weight: 700;
      flex: 0 0 1.8rem;
      overflow: hidden;
    }

    .message__avatar img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
      border-radius: inherit;
    }

    .message--bot .message__bubble {
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .message--user { justify-content: flex-end; }

    .message--user .message__avatar {
      order: 2;
      background: linear-gradient(135deg, #d9f7e5, var(--gold));
    }

    .message--user .message__bubble {
      background: linear-gradient(135deg, rgba(194, 160, 90, 0.22), rgba(255, 255, 255, 0.08));
      border: 1px solid rgba(194, 160, 90, 0.24);
    }

    .message__bubble {
      max-width: 92%;
      padding: 0.45rem 0.55rem;
      border-radius: 12px 12px 12px 4px;
      color: var(--cream);
      font-size: 0.86rem;
      line-height: 1.35;
      word-break: break-word;
    }

    .message--user .message__bubble { border-radius: 12px 12px 4px 12px; }

    .chat-form {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 0.35rem;
      margin-top: 0.45rem;
    }

    .chat-input {
      width: 100%;
      min-height: 40px;
      padding: 0.52rem 0.55rem;
      border: 1px solid rgba(194, 160, 90, 0.25);
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.04);
      color: var(--cream);
      font: inherit;
    }

    .chat-input:focus-visible {
      outline: 2px solid rgba(194, 160, 90, 0.8);
      outline-offset: 2px;
    }

    .send-button {
      border: 0;
      border-radius: 10px;
      padding: 0 0.65rem;
      background: linear-gradient(135deg, var(--gold-soft), var(--gold));
      color: #102218;
      font-weight: 700;
      cursor: pointer;
      min-height: 40px;
    }

    @media (max-width: 640px) {
      .floating-widget {
        right: 10px;
        bottom: 10px;
        left: 10px;
        align-items: stretch;
      }

      .widget-panel {
        width: 100%;
        max-width: none;
      }

      .widget-launcher {
        width: 64px;
        height: 64px;
        align-self: flex-end;
        font-size: 0.75rem;
      }

      .widget-launcher::after {
        right: auto;
        left: 50%;
        bottom: calc(100% + 8px);
        transform: translateX(-50%) translateY(4px);
      }
    }
  </style>
</head>
<body>
  <aside class="floating-widget" aria-label="CAINT floating widget" aria-live="polite">
    <button class="widget-launcher" type="button" data-launcher aria-expanded="false" aria-controls="spurl-chat-panel" aria-label="Open CAINT chatbot">
      <span>CAINT</span>
    </button>

    <section class="widget-panel" id="spurl-chat-panel" aria-label="CAINT chatbot panel">
      <header class="floating-header">
        <div>
          <div class="floating-title">CAINT</div>
          <div class="floating-subtitle">The Spurl Guide</div>
        </div>
        <button class="icon-button" type="button" data-close-widget aria-label="Close CAINT panel">×</button>
      </header>
      <div class="floating-body">
        <div class="chip-row" data-suggestions></div>
        <div class="chat-log" data-chat-log aria-live="polite"></div>
        <form class="chat-form" data-chat-form>
          <input class="chat-input" type="text" data-chat-input placeholder="Ask about the site…" autocomplete="off" />
          <button class="send-button" type="submit">Go</button>
        </form>
      </div>
    </section>
  </aside>

  <script src="js/knowledge-bot.js"></script>
  <script src="js/chatbot.js"></script>
  <script>
    const widget = document.querySelector('.floating-widget');
    const launcher = document.querySelector('[data-launcher]');
    const closeButton = document.querySelector('[data-close-widget]');

    function openWidget() {
      widget.classList.add('is-open');
      launcher.setAttribute('aria-expanded', 'true');
    }

    function closeWidget() {
      widget.classList.remove('is-open');
      launcher.setAttribute('aria-expanded', 'false');
      launcher.focus();
    }

    launcher.addEventListener('click', () => {
      if (widget.classList.contains('is-open')) {
        closeWidget();
      } else {
        openWidget();
      }
    });

    closeButton.addEventListener('click', closeWidget);

    document.addEventListener('click', (event) => {
      if (!widget.contains(event.target) && widget.classList.contains('is-open')) {
        closeWidget();
      }
    });

    document.addEventListener('keydown', (event) => {
      if (event.key === 'Escape' && widget.classList.contains('is-open')) {
        closeWidget();
      }
    });
  </script>
</body>
</html>
